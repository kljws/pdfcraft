<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PDFCraft server playground</title>
		<link rel="stylesheet" href="/pdfjs/pdf-annotation-layer.css" />
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<header>
			<div class="identity">
				<strong>Server playground</strong>
				<span>PDF generation runs in Node.js</span>
			</div>
			<label>
				<span>Sample</span>
				<select id="sample"></select>
			</label>
			<button id="generate" type="button">Generate</button>
			<button id="download" type="button" disabled>Download</button>
			<output id="status" title="Ready" aria-live="polite">Ready</output>
		</header>
		<main>
			<label class="editor-pane">
				<span class="visually-hidden">Document definition</span>
				<textarea id="editor" spellcheck="false"></textarea>
			</label>
			<div id="pdf-container" aria-label="Server-generated PDF preview"></div>
		</main>
		<script type="module" src="/app.js"></script>
	</body>
</html>
